- hosts: hostserver
  vars:
    ansible_python_interpreter: /usr/bin/python3.12
    project_dir: /home/smallbenji/ds28-ansible/wordpress

    wp_db_root: "{{ lookup('ansible.builtin.passwordstore', 'secrets/wp-db-root') }}"
    wp_db_pass: "{{ lookup('ansible.builtin.passwordstore', 'secrets/wp-db-user-pass') }}"

  tasks:
    - ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - become: true
      ansible.builtin.file:
        path: "{{ project_dir }}/wp"
        state: directory
        owner: 33
        group: 33
        mode: '0775'

    - become: true
      ansible.builtin.file:
        path: "{{ project_dir }}/db"
        state: directory
        mode: '0700'

    - ansible.builtin.template:
        src: templates/wordpress/docker-compose.yml.j2
        dest: "{{ project_dir }}/docker-compose.yml"
        mode: '0600'

    - become: true
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        # pull: always