- hosts: hostserver
  vars:
    ansible_python_interpreter: /usr/bin/python3.12
    project_dir: /home/smallbenji/ds28-ansible/services

    db_pass: "{{ lookup('ansible.builtin.passwordstore', 'secrets/db-creds') }}"
    kc_db_pass: "{{ lookup('ansible.builtin.passwordstore', 'secrets/kc-db-creds') }}"
    kc_admin_password: "{{ lookup('ansible.builtin.passwordstore', 'secrets/kc-admin-creds') }}"

  tasks:
    - ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - become: true
      ansible.builtin.file:
        path: "{{ project_dir }}/db"
        state: directory
        mode: '0700'

    - ansible.builtin.template:
        src: templates/services/docker-compose.yml.j2
        dest: "{{ project_dir }}/docker-compose.yml"
        mode: '0600'

    - become: true
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        # pull: always